name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]
        compiler: [MSVC, Clang]

    steps:
    - uses: actions/checkout@v4

    - name: Install Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 1.4.304.0
        vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang, SPIRV-Tools, SPIRV-Headers, SPIRV-Reflect
        vulkan-use-cache: false

    - name: Configure CMake
      shell: pwsh
      run: |
        if ("${{ matrix.compiler }}" -eq "Clang") {
          cmake -B build -S . -A x64 -T ClangCL -DCONV_USE_CLANG_CL=ON
        } else {
          cmake -B build -S . -A x64 -DCONV_USE_CLANG_CL=OFF
        }

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --target Convolution
