name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]
        compiler: [MSVC, Clang]

    steps:
    - uses: actions/checkout@v4

    - name: Install Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 1.4.304.0
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: false

    - name: Configure CMake
      run: |
        if ("${{ matrix.compiler }}" -eq "Clang") {
          cmake -B ${{ github.workspace }}/build -S ${{ github.workspace }} -G "Visual Studio 17 2022" -A x64 -T ClangCL -DCONV_USE_CLANG_CL=ON
        } else {
          cmake -B ${{ github.workspace }}/build -S ${{ github.workspace }} -G "Visual Studio 17 2022" -A x64
        }
      shell: pwsh

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --target Convolution
